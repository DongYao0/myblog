services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: myblog-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"

  mysql:
    image: mysql:8.4
    container_name: myblog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myblog
      MYSQL_USER: myblog
      MYSQL_PASSWORD: myblog
    ports:
      - "13306:3306"
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7.2
    container_name: myblog-redis
    ports:
      - "16379:6379"

  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: myblog-rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: myblog-rocketmq-broker
    command: sh mqbroker -c /home/rocketmq/broker.conf
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/broker.conf:ro
    ports:
      - "10911:10911"
      - "10909:10909"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: myblog-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
