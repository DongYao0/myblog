server:
  port: 18081

spring:
  application:
    name: blog-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    url: jdbc:mysql://localhost:13306/myblog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: myblog
    password: myblog
  data:
    redis:
      host: localhost
      port: 16379

management:
  endpoints:
    web:
      exposure:
        include: health,info
