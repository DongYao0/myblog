server:
  port: 18080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - http://localhost:5173
              - http://127.0.0.1:5173
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - Authorization
              - Content-Type
      routes:
        - id: blog-service
          uri: lb://blog-service
          predicates:
            - Path=/api/blog/**
        - id: ai-agent-service
          uri: http://localhost:18000
          predicates:
            - Path=/api/ai/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
